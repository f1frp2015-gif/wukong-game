      ctx.lineWidth = 1;
      ctx.strokeRect(bx, by, barWidth, 8);
    }

    function drawPeach(p) {
      const sx = p.x - camera.x;
      const sy = p.y - camera.y + Math.sin(p.pulse) * 3;
      const r = 11 * (1 + Math.sin(p.pulse * 1.3) * 0.08);

      ctx.save();
      ctx.translate(sx, sy);
      const skin = ctx.createRadialGradient(-r * 0.3, -r * 0.3, r * 0.1, 0, 0, r * 1.2);
      skin.addColorStop(0, '#ffd9b0');
      skin.addColorStop(0.55, '#f5a572');
      skin.addColorStop(1, '#e07a63');
      ctx.fillStyle = skin;
      ctx.beginPath();
      ctx.arc(-r * 0.28, 0, r * 0.72, 0, Math.PI * 2);
      ctx.arc(r * 0.28, 0, r * 0.72, 0, Math.PI * 2);
      ctx.fill();
      ctx.strokeStyle = '#c95f55';
      ctx.lineWidth = 1.5;
      ctx.beginPath();
      ctx.moveTo(0, -r * 0.6);
      ctx.quadraticCurveTo(-r * 0.15, 0, 0, r * 0.65);
      ctx.stroke();
      ctx.fillStyle = '#4f7a35';
      ctx.beginPath();
      ctx.ellipse(r * 0.2, -r * 0.75, r * 0.34, r * 0.14, -0.5, 0, Math.PI * 2);
      ctx.fill();
      ctx.restore();
    }

    function drawWindupRing(x, y, r) {
      ctx.strokeStyle = `rgba(255, 45, 45, ${0.5 + Math.sin(frameCount * 0.5) * 0.3})`;
      ctx.lineWidth = Math.max(2, r * 0.08);
      ctx.beginPath();
      ctx.arc(x, y, r, 0, Math.PI * 2);
      ctx.stroke();
    }

    // 狼妖：直立狼人（原点为脚底）。
    function drawWolfChar(e, sx, sy) {
      const r = e.radius;
      const bob = Math.sin(frameCount * 0.12 + e.bob) * 2;

      ctx.save();
      ctx.translate(sx, sy + bob);

      if (e.state === 'windup') drawWindupRing(0, -r * 1.6, r * 1.9);

      // 阴影。
      ctx.fillStyle = 'rgba(0,0,0,0.22)';
      ctx.beginPath();
      ctx.ellipse(0, 0, r * 0.9, r * 0.3, 0, 0, Math.PI * 2);
      ctx.fill();

      // 鬃毛。
      ctx.fillStyle = '#33333a';
      ctx.beginPath();
      ctx.ellipse(0, -r * 2.1, r * 0.72, r * 0.55, 0, 0, Math.PI * 2);
      ctx.fill();

      // 双腿。
      ctx.fillStyle = '#4c4c54';
      ctx.beginPath();
      ctx.moveTo(-r * 0.44, -r * 1.15);
      ctx.quadraticCurveTo(-r * 0.6, -r * 0.55, -r * 0.5, 0);
      ctx.lineTo(-r * 0.14, 0);
      ctx.quadraticCurveTo(-r * 0.28, -r * 0.55, -r * 0.12, -r * 1.05);
      ctx.closePath();
      ctx.fill();
      ctx.beginPath();
      ctx.moveTo(r * 0.44, -r * 1.15);
      ctx.quadraticCurveTo(r * 0.6, -r * 0.55, r * 0.5, 0);
      ctx.lineTo(r * 0.14, 0);
      ctx.quadraticCurveTo(r * 0.28, -r * 0.55, r * 0.12, -r * 1.05);
      ctx.closePath();
      ctx.fill();

      // 腰布。
      ctx.fillStyle = '#5a3a28';
      ctx.fillRect(-r * 0.45, -r * 1.28, r * 0.9, r * 0.18);

      // 躯干。
      const torso = ctx.createLinearGradient(0, -r * 2.3, 0, -r * 0.9);
      torso.addColorStop(0, '#86868e');
      torso.addColorStop(1, '#55555d');
      ctx.fillStyle = torso;
      ctx.beginPath();
      ctx.ellipse(0, -r * 1.55, r * 0.58, r * 0.68, 0, 0, Math.PI * 2);
      ctx.fill();

      // 手臂 + 利爪。
      ctx.fillStyle = '#60606a';
      ctx.beginPath();
      ctx.ellipse(-r * 0.75, -r * 1.5, r * 0.22, r * 0.55, 0.35, 0, Math.PI * 2);
      ctx.ellipse(r * 0.75, -r * 1.5, r * 0.22, r * 0.55, -0.35, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = '#cfcfc0';
      for (const side of [-1, 1]) {
        for (let c = 0; c < 3; c++) {
          ctx.beginPath();
          ctx.moveTo(side * (r * 0.82 + c * r * 0.07), -r * 1.0);
          ctx.lineTo(side * (r * 0.89 + c * r * 0.07), -r * 1.0);
          ctx.lineTo(side * (r * 0.855 + c * r * 0.07), -r * 0.78);
          ctx.fill();
        }
      }

      // 狼头。
      ctx.fillStyle = '#767680';
      ctx.beginPath();
      ctx.ellipse(0, -r * 2.4, r * 0.34, r * 0.3, 0, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = '#3c3c44';
      ctx.beginPath();
      ctx.moveTo(-r * 0.26, -r * 2.56);
      ctx.lineTo(-r * 0.34, -r * 2.94);
      ctx.lineTo(-r * 0.1, -r * 2.62);
      ctx.fill();
      ctx.beginPath();
      ctx.moveTo(r * 0.26, -r * 2.56);
      ctx.lineTo(r * 0.34, -r * 2.94);
      ctx.lineTo(r * 0.1, -r * 2.62);
      ctx.fill();
      ctx.fillStyle = '#8d8d96';
      ctx.beginPath();
      ctx.ellipse(0, -r * 2.28, r * 0.2, r * 0.13, 0, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = '#e8e4d8';
      ctx.beginPath();
      ctx.moveTo(-r * 0.11, -r * 2.26);
      ctx.lineTo(-r * 0.05, -r * 2.26);
      ctx.lineTo(-r * 0.08, -r * 2.14);
      ctx.fill();
      ctx.beginPath();
      ctx.moveTo(r * 0.11, -r * 2.26);
      ctx.lineTo(r * 0.05, -r * 2.26);
      ctx.lineTo(r * 0.08, -r * 2.14);
      ctx.fill();
      ctx.fillStyle = '#e8e8d0';
      ctx.shadowColor = '#ffffcc';
      ctx.shadowBlur = 5;
      ctx.beginPath();
      ctx.ellipse(-r * 0.14, -r * 2.46, r * 0.06, r * 0.04, -0.35, 0, Math.PI * 2);
      ctx.ellipse(r * 0.14, -r * 2.46, r * 0.06, r * 0.04, 0.35, 0, Math.PI * 2);
      ctx.fill();
      ctx.shadowBlur = 0;

      if (e.flash > 0) {
        ctx.globalAlpha = e.flash / 6 * 0.55;
        ctx.fillStyle = '#fff';
        ctx.beginPath();
        ctx.ellipse(0, -r * 1.6, r * 0.95, r * 1.5, 0, 0, Math.PI * 2);
        ctx.fill();
        ctx.globalAlpha = 1;
      }

      ctx.restore();
    }

    // 蛇妖：盘尾蛇人——盘绕蛇尾、人身躯干、双臂、蛇头（原点为盘身底部）。
    function drawSnakeChar(e, sx, sy) {
      const r = e.radius;
      const bob = Math.sin(frameCount * 0.15 + e.bob) * 2;

      ctx.save();
      ctx.translate(sx, sy + bob);

      if (e.state === 'windup') drawWindupRing(0, -r * 1.4, r * 2);

      ctx.fillStyle = 'rgba(0,0,0,0.2)';
      ctx.beginPath();
      ctx.ellipse(0, 0, r * 1.1, r * 0.32, 0, 0, Math.PI * 2);
      ctx.fill();

      // 盘绕的蛇尾。
      ctx.fillStyle = '#3e6b34';
      ctx.beginPath();
      ctx.ellipse(0, -r * 0.3, r * 1.15, r * 0.45, 0, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = '#4d8040';
      ctx.beginPath();
      ctx.ellipse(0, -r * 0.75, r * 0.9, r * 0.38, 0, 0, Math.PI * 2);
      ctx.fill();

      // 人身躯干。
      const torso = ctx.createLinearGradient(0, -r * 2.2, 0, -r * 0.8);
      torso.addColorStop(0, '#5c9148');
      torso.addColorStop(1, '#3e6b34');
      ctx.fillStyle = torso;
      ctx.beginPath();
      ctx.ellipse(0, -r * 1.5, r * 0.55, r * 0.62, 0, 0, Math.PI * 2);
      ctx.fill();
      // 腹甲浅纹。
      ctx.strokeStyle = 'rgba(220, 235, 180, 0.5)';
      ctx.lineWidth = 1.5;
      for (let i = 0; i < 3; i++) {
        ctx.beginPath();
        ctx.moveTo(-r * 0.3, -r * (1.2 + i * 0.25));
        ctx.quadraticCurveTo(0, -r * (1.12 + i * 0.25), r * 0.3, -r * (1.2 + i * 0.25));
        ctx.stroke();
      }

      // 双臂带爪。
      ctx.fillStyle = '#3e6b34';
      ctx.beginPath();
      ctx.ellipse(-r * 0.62, -r * 1.45, r * 0.16, r * 0.48, 0.4, 0, Math.PI * 2);
      ctx.ellipse(r * 0.62, -r * 1.45, r * 0.16, r * 0.48, -0.4, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = '#d8e8c8';
      for (const side of [-1, 1]) {
        for (let c = 0; c < 3; c++) {
          ctx.beginPath();
          ctx.moveTo(side * (r * 0.72 + c * r * 0.06), -r * 1.02);
          ctx.lineTo(side * (r * 0.78 + c * r * 0.06), -r * 1.02);
          ctx.lineTo(side * (r * 0.75 + c * r * 0.06), -r * 0.84);
          ctx.fill();
        }
      }

      // 蛇头。
      ctx.fillStyle = '#4d8040';
      ctx.beginPath();
      ctx.ellipse(0, -r * 2.4, r * 0.5, r * 0.38, 0, 0, Math.PI * 2);
      ctx.fill();
      // 眼睛与信子。
      ctx.fillStyle = '#f2d13c';
      ctx.beginPath();
      ctx.arc(-r * 0.2, -r * 2.48, r * 0.1, 0, Math.PI * 2);
      ctx.arc(r * 0.2, -r * 2.48, r * 0.1, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = '#111';
      ctx.beginPath();
      ctx.ellipse(-r * 0.2, -r * 2.48, r * 0.03, r * 0.08, 0, 0, Math.PI * 2);
      ctx.ellipse(r * 0.2, -r * 2.48, r * 0.03, r * 0.08, 0, 0, Math.PI * 2);
      ctx.fill();
      if (Math.sin(frameCount * 0.2 + e.bob) > 0.3) {
        ctx.strokeStyle = '#d33';
        ctx.lineWidth = 1.5;
        ctx.beginPath();
        ctx.moveTo(0, -r * 2.3);
        ctx.lineTo(0, -r * 2.0);
        ctx.moveTo(0, -r * 2.0);
        ctx.lineTo(-r * 0.1, -r * 1.88);
        ctx.moveTo(0, -r * 2.0);
        ctx.lineTo(r * 0.1, -r * 1.88);
        ctx.stroke();
      }

      if (e.flash > 0) {
        ctx.globalAlpha = e.flash / 6 * 0.55;
        ctx.fillStyle = '#fff';
        ctx.beginPath();
        ctx.ellipse(0, -r * 1.4, r * 1.1, r * 1.6, 0, 0, Math.PI * 2);
        ctx.fill();
        ctx.globalAlpha = 1;
      }

      ctx.restore();
    }

    // 石精：灰岩巨人全身——双腿、石躯、双臂石拳、头顶岩盔（原点为脚底）。
    function drawGolemChar(e, sx, sy) {
      const r = e.radius;
      const bob = Math.sin(frameCount * 0.06 + e.bob) * 1.5;

      ctx.save();
      ctx.translate(sx, sy + bob);

      if (e.state === 'windup') drawWindupRing(0, -r * 1.4, r * 1.9);

      ctx.fillStyle = 'rgba(0,0,0,0.24)';
      ctx.beginPath();
      ctx.ellipse(0, 0, r * 1.2, r * 0.3, 0, 0, Math.PI * 2);
      ctx.fill();

      // 石腿。
      ctx.fillStyle = '#6f6f73';
      ctx.beginPath();
      ctx.arc(-r * 0.42, -r * 0.3, r * 0.34, 0, Math.PI * 2);
      ctx.arc(r * 0.42, -r * 0.3, r * 0.34, 0, Math.PI * 2);
      ctx.fill();

      // 石躯。
      const rock = ctx.createRadialGradient(-r * 0.3, -r * 1.7, r * 0.2, 0, -r * 1.3, r * 1.4);
      rock.addColorStop(0, '#9a9aa0');
      rock.addColorStop(1, '#5c5c62');
      ctx.fillStyle = rock;
      ctx.beginPath();
      ctx.arc(0, -r * 1.3, r * 1.05, 0, Math.PI * 2);
      ctx.fill();

      // 双臂石拳。
      ctx.fillStyle = '#6f6f73';
      ctx.beginPath();
      ctx.ellipse(-r * 1.1, -r * 1.25, r * 0.3, r * 0.55, 0.2, 0, Math.PI * 2);
      ctx.ellipse(r * 1.1, -r * 1.25, r * 0.3, r * 0.55, -0.2, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = '#5c5c62';
      ctx.beginPath();
      ctx.arc(-r * 1.2, -r * 0.75, r * 0.34, 0, Math.PI * 2);
      ctx.arc(r * 1.2, -r * 0.75, r * 0.34, 0, Math.PI * 2);
      ctx.fill();

      // 裂纹。
      ctx.strokeStyle = 'rgba(40, 40, 45, 0.6)';
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.moveTo(-r * 0.4, -r * 2);
      ctx.lineTo(-r * 0.1, -r * 1.5);
      ctx.lineTo(-r * 0.35, -r * 1);
      ctx.moveTo(r * 0.45, -r * 1.8);
      ctx.lineTo(r * 0.2, -r * 1.3);
      ctx.stroke();

      // 苔痕。
      ctx.fillStyle = 'rgba(90, 130, 70, 0.6)';
      ctx.beginPath();
      ctx.ellipse(-r * 0.5, -r * 0.9, r * 0.28, r * 0.16, 0.4, 0, Math.PI * 2);
      ctx.fill();

      // 头顶岩盔与发光双眼。
      ctx.fillStyle = '#7a7a80';
      ctx.beginPath();
      ctx.arc(0, -r * 2.35, r * 0.48, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = '#5c5c62';
      ctx.beginPath();
      ctx.arc(0, -r * 2.55, r * 0.3, Math.PI, 0);
      ctx.fill();
      ctx.fillStyle = '#ffbf40';
      ctx.shadowColor = '#ffbf40';
      ctx.shadowBlur = 8;
      ctx.beginPath();
      ctx.arc(-r * 0.18, -r * 2.35, r * 0.09, 0, Math.PI * 2);
      ctx.arc(r * 0.18, -r * 2.35, r * 0.09, 0, Math.PI * 2);
      ctx.fill();
      ctx.shadowBlur = 0;

      if (e.flash > 0) {
        ctx.globalAlpha = e.flash / 6 * 0.55;
        ctx.fillStyle = '#fff';
        ctx.beginPath();
        ctx.ellipse(0, -r * 1.4, r * 1.3, r * 1.5, 0, 0, Math.PI * 2);
        ctx.fill();
        ctx.globalAlpha = 1;
      }

      ctx.restore();
    }

    // 黑风大王：完整黑熊精——后腿、毛躯、垂地双臂、熊头。
    function drawBossBear(e, sx, sy) {
      const u = e.radius * 1.15;
      const bob = Math.sin(frameCount * 0.08) * 2;

      ctx.save();
      ctx.translate(sx, sy + bob);

      if (e.state === 'windup') drawWindupRing(0, -u * 1.7, u * 2.1);

      // 阴影。
      ctx.fillStyle = 'rgba(0,0,0,0.28)';
      ctx.beginPath();
      ctx.ellipse(0, 0, u * 1.25, u * 0.32, 0, 0, Math.PI * 2);
      ctx.fill();

      // 后腿。
      ctx.fillStyle = '#1d150e';
      ctx.beginPath();
      ctx.ellipse(-u * 0.42, -u * 0.5, u * 0.36, u * 0.55, 0, 0, Math.PI * 2);
      ctx.ellipse(u * 0.42, -u * 0.5, u * 0.36, u * 0.55, 0, 0, Math.PI * 2);
      ctx.fill();

      // 垂地双臂 + 白爪。
      ctx.fillStyle = '#241a12';
      ctx.beginPath();
      ctx.ellipse(-u * 1.05, -u * 1.2, u * 0.3, u * 0.8, 0.22, 0, Math.PI * 2);
      ctx.ellipse(u * 1.05, -u * 1.2, u * 0.3, u * 0.8, -0.22, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = '#e8e0d0';
      for (const side of [-1, 1]) {
        for (let c = 0; c < 3; c++) {
          const bx = side * (u * 1.12 + c * u * 0.09);
          ctx.beginPath();
          ctx.moveTo(bx, -u * 0.5);
          ctx.lineTo(bx + side * u * 0.08, -u * 0.5);
          ctx.lineTo(bx + side * u * 0.04, -u * 0.28);
          ctx.fill();
        }
      }

      // 毛躯（带毛刺边缘）。
      const fur = ctx.createRadialGradient(-u * 0.25, -u * 2, u * 0.2, 0, -u * 1.5, u * 1.5);
      fur.addColorStop(0, '#3d2f22');
      fur.addColorStop(1, '#211710');
      ctx.fillStyle = fur;
      ctx.beginPath();
      const spikes = 30;
      for (let i = 0; i < spikes; i++) {
        const a1 = (i / spikes) * Math.PI * 2;
        const a2 = ((i + 0.5) / spikes) * Math.PI * 2;
        ctx.lineTo(Math.cos(a1) * u * 1.06, -u * 1.55 + Math.sin(a1) * u * 1.0);
        ctx.lineTo(Math.cos(a2) * u * 1.16, -u * 1.55 + Math.sin(a2) * u * 1.1);
      }
      ctx.closePath();
      ctx.fill();

      // 熊头。
      const hy = -u * 2.75;
      ctx.fillStyle = '#241a12';
      ctx.beginPath();
      ctx.arc(0, hy, u * 0.62, 0, Math.PI * 2);
      ctx.fill();
      ctx.beginPath();
      ctx.arc(-u * 0.4, hy - u * 0.42, u * 0.17, 0, Math.PI * 2);
      ctx.arc(u * 0.4, hy - u * 0.42, u * 0.17, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = '#54402c';
      ctx.beginPath();
      ctx.arc(-u * 0.4, hy - u * 0.42, u * 0.08, 0, Math.PI * 2);
      ctx.arc(u * 0.4, hy - u * 0.42, u * 0.08, 0, Math.PI * 2);
      ctx.fill();

      // 眼睛。
      ctx.fillStyle = '#160e06';
      ctx.beginPath();
      ctx.arc(-u * 0.22, hy - u * 0.1, u * 0.07, 0, Math.PI * 2);
      ctx.arc(u * 0.22, hy - u * 0.1, u * 0.07, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = 'rgba(255,255,255,0.75)';
      ctx.beginPath();
      ctx.arc(-u * 0.24, hy - u * 0.13, u * 0.025, 0, Math.PI * 2);
      ctx.arc(u * 0.2, hy - u * 0.13, u * 0.025, 0, Math.PI * 2);
      ctx.fill();

      // 吻部与黑鼻。
      ctx.fillStyle = '#6e553a';
      ctx.beginPath();
      ctx.ellipse(0, hy + u * 0.22, u * 0.26, u * 0.18, 0, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = '#0d0906';
      ctx.beginPath();
      ctx.ellipse(0, hy + u * 0.12, u * 0.09, u * 0.06, 0, 0, Math.PI * 2);
      ctx.fill();

      if (e.state === 'windup') {
        // 咆哮：张嘴露出暗红口腔与牙齿。
        ctx.fillStyle = '#4a1208';
        ctx.beginPath();
        ctx.ellipse(0, hy + u * 0.38, u * 0.18, u * 0.12, 0, 0, Math.PI * 2);
        ctx.fill();
        ctx.fillStyle = '#e8e0d0';
        for (let i = -1; i <= 1; i++) {
          ctx.beginPath();
          ctx.moveTo(i * u * 0.1 - u * 0.035, hy + u * 0.28);
          ctx.lineTo(i * u * 0.1 + u * 0.035, hy + u * 0.28);
          ctx.lineTo(i * u * 0.1, hy + u * 0.38);
          ctx.fill();
        }
      } else {
        ctx.strokeStyle = '#0d0906';
        ctx.lineWidth = 2;
        ctx.lineCap = 'round';
        ctx.beginPath();
        ctx.moveTo(0, hy + u * 0.18);
        ctx.lineTo(0, hy + u * 0.32);
        ctx.stroke();
      }

      if (e.flash > 0) {
        ctx.globalAlpha = e.flash / 6 * 0.5;
        ctx.fillStyle = '#fff';
        ctx.beginPath();
        ctx.ellipse(0, -u * 1.6, u * 1.3, u * 2, 0, 0, Math.PI * 2);
        ctx.fill();
        ctx.globalAlpha = 1;
      }

      ctx.restore();

      // 头顶血条。
      const barWidth = u * 2.4;
      const bx = sx - barWidth / 2;
      const by = sy - u * 3.8;
      ctx.fillStyle = 'rgba(0,0,0,0.6)';
      ctx.fillRect(bx - 2, by - 2, barWidth + 4, 12);
      ctx.fillStyle = '#2c3e50';
      ctx.fillRect(bx, by, barWidth, 8);
      ctx.fillStyle = '#e74c3c';
      ctx.fillRect(bx, by, barWidth * Math.max(0, e.hp / e.maxHp), 8);
      ctx.strokeStyle = '#fff';
      ctx.lineWidth = 1;
      ctx.strokeRect(bx, by, barWidth, 8);
    }

    function drawEnemy(e) {
      const sx = e.x - camera.x;
      const sy = e.y - camera.y;
      if (sx < -120 || sy < -160 || sx > canvas.width + 120 || sy > canvas.height + 120) return;

      // BOSS 大招蓄力：红光笼罩预警。
      if (e.state === 'windup' && e.heavy) {
        const pr = 1 + Math.sin(frameCount * 0.4) * 0.08;
        ctx.fillStyle = 'rgba(255, 30, 30, 0.16)';
        ctx.beginPath();
        ctx.arc(sx, sy - e.radius * 1.4, e.radius * 2.3 * pr, 0, Math.PI * 2);
        ctx.fill();
        ctx.strokeStyle = 'rgba(255, 30, 30, 0.75)';
        ctx.lineWidth = 3.5;
        ctx.beginPath();
        ctx.arc(sx, sy - e.radius * 1.4, e.radius * 2.3 * pr, 0, Math.PI * 2);
        ctx.stroke();
      }

      if (e.isBoss) {
        if (e.type === 'jinchi') drawJinchi(e, sx, sy);
        else if (e.type === 'huangfeng') drawHuangfengBoss(e, sx, sy);
        else if (e.type === 'shaguo') drawShaguo(e, sx, sy);
        else if (e.type === 'shixian') drawShixian(e, sx, sy);
        else if (e.type === 'huxian') drawHuxian(e, sx, sy);
        else drawBossBear(e, sx, sy);
      }
      else if (e.type === 'wolf') drawWolfChar(e, sx, sy);
      else if (e.type === 'snake') drawSnakeChar(e, sx, sy);
      else if (e.type === 'rat') drawRatChar(e, sx, sy);
      else drawGolemChar(e, sx, sy);

      // 定身效果。
      if (e.frozen > 0) {
        ctx.fillStyle = 'rgba(140, 200, 255, 0.22)';
        ctx.beginPath();
        ctx.ellipse(sx, sy - e.radius * 1.4, e.radius * 1.3, e.radius * 1.8, 0, 0, Math.PI * 2);
        ctx.fill();
        ctx.fillStyle = '#9fd8ff';
        ctx.font = `bold ${Math.max(14, e.radius * 0.7)}px serif`;
        ctx.textAlign = 'center';
        ctx.strokeStyle = '#0a2a44';
        ctx.lineWidth = 3;
        const fy = sy - e.radius * 3.4;
        ctx.strokeText('定', sx, fy);
        ctx.fillText('定', sx, fy);
        ctx.textAlign = 'left';
      }
    }

    function drawPlayer() {
      const sx = player.x - camera.x;
      const sy = player.y - camera.y;
      const r = player.r;

      ctx.save();
      ctx.translate(sx, sy);

      // 阴影。
      ctx.fillStyle = 'rgba(0,0,0,0.25)';
      ctx.beginPath();
      ctx.ellipse(0, 0, r * 1.1, r * 0.35, 0, 0, Math.PI * 2);
      ctx.fill();

      // 避火罩：金色护体光环。
      if (player.hasMantle) {
        ctx.fillStyle = 'rgba(255, 215, 0, 0.1)';
        ctx.beginPath();
        ctx.arc(0, -r * 1.6, r * 2, 0, Math.PI * 2);
        ctx.fill();
        ctx.strokeStyle = `rgba(255, 215, 0, ${0.4 + Math.sin(frameCount * 0.1) * 0.15})`;
        ctx.lineWidth = 2.5;
        ctx.beginPath();
        ctx.arc(0, -r * 1.6, r * 2, 0, Math.PI * 2);
        ctx.stroke();
      }

      // 蓄力光环：金光环绕，满蓄时转白。
      if (charge.charging) {
        const lv = charge.level;
        const pulse = 1 + Math.sin(frameCount * 0.3) * 0.06;
        ctx.fillStyle = `rgba(255, 215, 0, ${0.07 + lv * 0.13})`;
        ctx.beginPath();
        ctx.arc(0, -r * 1.6, r * (1.6 + lv * 1.4) * pulse, 0, Math.PI * 2);
        ctx.fill();
        ctx.strokeStyle = lv >= 1 ? 'rgba(255, 255, 230, 0.95)' : 'rgba(255, 215, 0, 0.55)';
        ctx.lineWidth = 2 + lv * 2;
        ctx.beginPath();
        ctx.arc(0, -r * 1.6, r * (1.6 + lv * 1.4) * pulse, 0, Math.PI * 2);
        ctx.stroke();
      }

      // 三种棍式各有架势。
      const st = STANCES[stanceIdx];
      const swingP = staff.swinging ? 1 - staff.timer / staff.duration : 0;
      let rel;
      let lenVis;
      if (st.kind === 'chop') {
        rel = staff.swinging ? -1.6 + swingP * 2.1 : -0.6;
        lenVis = st.range * 0.82;
      } else if (st.kind === 'vault') {
        rel = 0;
        lenVis = staff.swinging
          ? st.range * (0.7 + Math.sin(Math.min(swingP * 1.4, 1) * Math.PI * 0.5) * 0.65)
          : st.range * 0.7;
      } else {
        rel = 0;
        lenVis = staff.swinging
          ? st.range * (0.3 + Math.sin(swingP * Math.PI) * 0.7)
          : st.range * 0.55;
      }

      if (transform.active) {
        // 广智变身：灰狼战士（保持原来的旋转朝向画法）。
        ctx.save();
        ctx.rotate(player.angle + Math.PI / 2);
        ctx.fillStyle = '#33333a';
        ctx.beginPath();
        ctx.ellipse(0, r * 0.1, r * 0.95, r * 0.8, 0, 0, Math.PI * 2);
        ctx.fill();

        ctx.fillStyle = '#6a6a72';
        ctx.beginPath();
        ctx.arc(0, 0, r * 1.02, 0, Math.PI * 2);
        ctx.fill();

        ctx.fillStyle = '#a3352c';
        ctx.fillRect(-r, r * 0.15, r * 2, r * 0.3);

        ctx.fillStyle = '#7d7d85';
        ctx.beginPath();
        ctx.ellipse(0, -r * 0.42, r * 0.52, r * 0.42, 0, 0, Math.PI * 2);
        ctx.fill();
        ctx.fillStyle = '#3c3c44';
        ctx.beginPath();
        ctx.moveTo(-r * 0.34, -r * 0.66);
        ctx.lineTo(-r * 0.44, -r * 1.05);
        ctx.lineTo(-r * 0.14, -r * 0.72);
        ctx.fill();
        ctx.beginPath();
        ctx.moveTo(r * 0.34, -r * 0.66);
        ctx.lineTo(r * 0.44, -r * 1.05);
        ctx.lineTo(r * 0.14, -r * 0.72);
        ctx.fill();
        ctx.fillStyle = '#8d8d96';
        ctx.beginPath();
        ctx.ellipse(0, -r * 0.72, r * 0.24, r * 0.15, 0, 0, Math.PI * 2);
        ctx.fill();
        ctx.fillStyle = '#e8e8d0';
        ctx.shadowColor = '#ffffcc';
        ctx.shadowBlur = 5;
        ctx.beginPath();
        ctx.ellipse(-r * 0.2, -r * 0.5, r * 0.08, r * 0.05, -0.3, 0, Math.PI * 2);
        ctx.ellipse(r * 0.2, -r * 0.5, r * 0.08, r * 0.05, 0.3, 0, Math.PI * 2);
        ctx.fill();
        ctx.shadowBlur = 0;

        // 火焰刀。
        ctx.save();
        ctx.rotate(rel - Math.PI / 2);
        ctx.shadowColor = '#ff7a2a';
        ctx.shadowBlur = 18;
        ctx.strokeStyle = '#ff6a2a';
        ctx.lineWidth = 9;
        ctx.lineCap = 'round';
        ctx.beginPath();
        ctx.moveTo(-lenVis * 0.2, 0);
        ctx.lineTo(lenVis, 0);
        ctx.stroke();
        ctx.shadowBlur = 0;
        ctx.strokeStyle = '#ffd9a0';
        ctx.lineWidth = 3.5;
        ctx.beginPath();
        ctx.moveTo(lenVis * 0.2, 0);
        ctx.lineTo(lenVis, 0);
        ctx.stroke();
        if (frameCount % 3 === 0) {
          const a = player.angle + rel;
          particles.push({
            x: player.x + Math.cos(a) * lenVis,
            y: player.y + Math.sin(a) * lenVis,
            vx: randomRange(-0.8, 0.8),
            vy: randomRange(-1.6, -0.5),
            life: 0.6,
            color: frameCount % 2 ? '#ff8a3a' : '#ffcf6a',
            size: randomRange(2, 4)
          });
        }
        ctx.restore();
        ctx.restore();
      } else {
        // 天命人：四肢齐全的行者，走动与攻击皆有动作。
        const u = 13;
        const wp = player.walkPhase;
        const moving = player.moving;
        const legSwing = moving ? Math.sin(wp) * u * 0.6 : 0;
        const armSwing = moving ? Math.sin(wp) * 0.55 : 0;
        if (player.facing < 0) ctx.scale(-1, 1);

        const hipY = -u * 1.75;
        const shoulderY = -u * 2.75;
        const headY = -u * 3.5;

        // 双腿（走动时交替迈步）。
        ctx.strokeStyle = '#3d3020';
        ctx.lineWidth = u * 0.5;
        ctx.lineCap = 'round';
        ctx.beginPath();
        ctx.moveTo(-u * 0.3, hipY);
        ctx.lineTo(-u * 0.3 + legSwing, -u * 0.15);
        ctx.moveTo(u * 0.3, hipY);
        ctx.lineTo(u * 0.3 - legSwing, -u * 0.15);
        ctx.stroke();
        // 布鞋。
        ctx.fillStyle = '#241a10';
        ctx.beginPath();
        ctx.ellipse(-u * 0.3 + legSwing, -u * 0.1, u * 0.32, u * 0.14, 0, 0, Math.PI * 2);
        ctx.ellipse(u * 0.3 - legSwing, -u * 0.1, u * 0.32, u * 0.14, 0, 0, Math.PI * 2);
        ctx.fill();

        // 行者袍。
        const robe = ctx.createLinearGradient(0, shoulderY - 4, 0, hipY + 4);
        robe.addColorStop(0, '#6b5a40');
        robe.addColorStop(1, '#4a3c28');
        ctx.fillStyle = robe;
        ctx.beginPath();
        ctx.moveTo(-u * 0.62, shoulderY);
        ctx.quadraticCurveTo(-u * 0.75, -u * 2.2, -u * 0.62, hipY);
        ctx.lineTo(u * 0.62, hipY);
        ctx.quadraticCurveTo(u * 0.75, -u * 2.2, u * 0.62, shoulderY);
        ctx.closePath();
        ctx.fill();
        // 红绳腰带。
        ctx.fillStyle = '#a3352c';
        ctx.fillRect(-u * 0.68, -u * 1.95, u * 1.36, u * 0.28);

        // 左臂（走动时前后摆动）。
        ctx.strokeStyle = '#5a4a34';
        ctx.lineWidth = u * 0.4;
        ctx.beginPath();
        ctx.moveTo(-u * 0.6, shoulderY + 2);
        ctx.lineTo(-u * 0.85 - armSwing * u * 0.4, -u * 1.7);
        ctx.stroke();
        ctx.fillStyle = '#d9b48c';
        ctx.beginPath();
        ctx.arc(-u * 0.85 - armSwing * u * 0.4, -u * 1.7, u * 0.16, 0, Math.PI * 2);
        ctx.fill();

        // 右臂持棍：攻击、蓄力、行走各有架势。
        const sxp = u * 0.6;
        let armA;
        let staffA;
        if (staff.swinging) {
          if (st.kind === 'chop') {
            // 劈棍：举臂过顶劈落。
            armA = -2.5 + swingP * 2.9;
            staffA = armA + 0.5;
          } else if (st.kind === 'vault') {
            // 立棍：拄棍向地。
            armA = 0.35;
            staffA = 0.35;
          } else {
            // 戳棍：拧臂前刺。
            armA = -0.1;
            staffA = 0;
          }
        } else if (charge.charging) {
          // 蓄力：棍举过肩，金光渐盛。
          armA = -2.2 - charge.level * 0.5;
          staffA = armA + 0.4;
        } else {
          armA = -0.6 + armSwing * 0.5;
          staffA = -0.6 + (moving ? Math.sin(wp) * 0.1 : Math.sin(frameCount * 0.03) * 0.04);
        }
        const handX = sxp + Math.cos(armA) * u * 1.1;
        const handY = shoulderY + 2 + Math.sin(armA) * u * 1.1;
        ctx.beginPath();
        ctx.moveTo(sxp, shoulderY + 2);
        ctx.lineTo(handX, handY);
        ctx.stroke();
        ctx.fillStyle = '#d9b48c';
        ctx.beginPath();
        ctx.arc(handX, handY, u * 0.16, 0, Math.PI * 2);
        ctx.fill();

        // 金箍棒。
        const drawLen = Math.min(lenVis, 120);
        ctx.save();
        ctx.translate(handX, handY);
        ctx.rotate(staffA);
        if (player.empowered || (staff.swinging && staff.power > 1.4) || charge.charging) {
          ctx.shadowColor = '#ffd700';
          ctx.shadowBlur = staff.swinging && staff.power > 1.4 ? 24 : 14;
        }
        ctx.strokeStyle = '#6e4426';
        ctx.lineWidth = 5;
        ctx.lineCap = 'round';
        ctx.beginPath();
        ctx.moveTo(-drawLen * 0.3, 0);
        ctx.lineTo(drawLen, 0);
        ctx.stroke();
        ctx.strokeStyle = '#b18f3a';
        ctx.lineWidth = 6;
        ctx.beginPath();
        ctx.moveTo(drawLen - 11, 0);
        ctx.lineTo(drawLen, 0);
        ctx.stroke();
        ctx.restore();

        // 猴头：猴脸、双耳、金箍、双眼。
        ctx.fillStyle = '#8a6a48';
        ctx.beginPath();
        ctx.arc(0, headY, u * 0.52, 0, Math.PI * 2);
        ctx.fill();
        ctx.beginPath();
        ctx.arc(-u * 0.48, headY, u * 0.14, 0, Math.PI * 2);
        ctx.arc(u * 0.48, headY, u * 0.14, 0, Math.PI * 2);
        ctx.fill();
        ctx.fillStyle = '#d9b48c';
        ctx.beginPath();
        ctx.ellipse(0, headY + u * 0.1, u * 0.38, u * 0.3, 0, 0, Math.PI * 2);
        ctx.fill();
        ctx.strokeStyle = '#ffd700';
        ctx.lineWidth = 2.5;
        ctx.beginPath();
        ctx.arc(0, headY - u * 0.12, u * 0.5, -Math.PI * 0.82, -Math.PI * 0.18);
        ctx.stroke();
        ctx.fillStyle = '#1a1208';
        ctx.beginPath();
        ctx.arc(-u * 0.15, headY + u * 0.02, u * 0.06, 0, Math.PI * 2);
        ctx.arc(u * 0.15, headY + u * 0.02, u * 0.06, 0, Math.PI * 2);
        ctx.fill();
      }

      ctx.restore();

      // 蓄力条。
      if (charge.charging) {
        const bw = 54;
        const bx = sx - bw / 2;
        const by = sy - r * 3.4;
        ctx.fillStyle = 'rgba(0,0,0,0.5)';
        ctx.fillRect(bx - 2, by - 2, bw + 4, 10);
        ctx.fillStyle = charge.level >= 1 ? '#fff2b0' : '#ffd700';
        ctx.fillRect(bx, by, bw * charge.level, 6);
        ctx.strokeStyle = '#d4af37';
        ctx.lineWidth = 1;
        ctx.strokeRect(bx, by, bw, 6);
      }
    }

    function drawSlashes() {
      for (const s of slashes) {
        const sx = s.x - camera.x;
        const sy = s.y - camera.y;
        const glow = s.fire ? '#ff8a3a' : (s.power > 1.5 ? '#fff2b0' : '#ffe9a8');
        ctx.globalAlpha = s.life * 0.65;
        ctx.strokeStyle = glow;
        ctx.lineCap = 'round';
        ctx.shadowColor = s.fire ? '#ff6a2a' : '#ffd700';
        ctx.shadowBlur = 12;

        if (s.kind === 'thrust') {
          // 戳棍：一线疾刺。
          ctx.lineWidth = (5 + (1 - s.life) * 3) * (s.power > 1.5 ? 1.6 : 1);
          ctx.beginPath();
          ctx.moveTo(sx, sy);
          ctx.lineTo(sx + Math.cos(s.angle) * s.range, sy + Math.sin(s.angle) * s.range);
          ctx.stroke();
        } else if (s.kind === 'vault') {
          // 立棍：落点荡开的金环。
          const t = 1 - s.life;
          ctx.lineWidth = 6;
          ctx.beginPath();
          ctx.arc(s.tx - camera.x, s.ty - camera.y, 20 + t * s.radius, 0, Math.PI * 2);
          ctx.stroke();
        } else {
          // 劈棍：凌厉的窄弧劈痕。
          ctx.lineWidth = 6 + (1 - s.life) * 5;
          ctx.beginPath();
          ctx.arc(sx, sy, s.range * (1.02 - s.life * 0.12), s.angle - s.arc / 2, s.angle + s.arc / 2);
          ctx.stroke();
        }
        ctx.shadowBlur = 0;
      }
      ctx.globalAlpha = 1;
    }

    function drawSkillFx() {
      for (const fx of skillFx) {
        if (fx.type === 'ring') {
          const t = 1 - fx.life;
          ctx.strokeStyle = `rgba(255, 215, 0, ${fx.life * 0.8})`;
          ctx.lineWidth = 8 * fx.life + 2;
          ctx.beginPath();
          ctx.arc(fx.x - camera.x, fx.y - camera.y, 30 + t * 180, 0, Math.PI * 2);
          ctx.stroke();
        } else if (fx.type === 'beam') {
          ctx.strokeStyle = `rgba(255, 120, 40, ${fx.life})`;
          ctx.lineWidth = 10 * fx.life + 3;
          ctx.lineCap = 'round';
          ctx.shadowColor = '#ffdd55';
          ctx.shadowBlur = 16;
          ctx.beginPath();
          ctx.moveTo(fx.x1 - camera.x, fx.y1 - camera.y);
          ctx.lineTo(fx.x2 - camera.x, fx.y2 - camera.y);
          ctx.stroke();
          ctx.shadowBlur = 0;
        } else if (fx.type === 'crack') {
          // 重击落地：地面裂纹。
          const cx = fx.x - camera.x;
          const cy = fx.y - camera.y;
          ctx.strokeStyle = `rgba(40, 30, 20, ${fx.life * 0.8})`;
          ctx.lineWidth = 3;
          ctx.lineCap = 'round';
          const spread = 34 * (1.3 - fx.life);
          for (let i = -1; i <= 1; i++) {
            const a = fx.angle + i * 0.55;
            ctx.beginPath();
            ctx.moveTo(cx, cy);
            ctx.lineTo(cx + Math.cos(a) * spread, cy + Math.sin(a) * spread);
            ctx.stroke();
          }
        } else if (fx.type === 'shock') {
          // 砸地冲击波：红色扩散环。
          const t = 1 - fx.life;
          ctx.strokeStyle = `rgba(255, 45, 45, ${fx.life * 0.85})`;
          ctx.lineWidth = 8 * fx.life + 3;
          ctx.beginPath();
          ctx.arc(fx.x - camera.x, fx.y - camera.y, 20 + t * (fx.max || 170), 0, Math.PI * 2);
          ctx.stroke();
        } else if (fx.type === 'freezewave') {
          ctx.fillStyle = `rgba(150, 210, 255, ${fx.life * 0.15})`;
          ctx.fillRect(0, 0, canvas.width, canvas.height);
        }
      }
    }

    function drawProjectiles() {
      for (const p of projectiles) {
        const sx = p.x - camera.x;
        const sy = p.y - camera.y;
        ctx.fillStyle = p.color;
        ctx.shadowColor = p.heavy ? '#ff2020' : p.color;
        ctx.shadowBlur = p.heavy ? 22 : 10;
        ctx.beginPath();
        ctx.arc(sx, sy, p.radius, 0, Math.PI * 2);
        ctx.fill();
        ctx.shadowBlur = 0;
        if (p.heavy) {
          // 大招弹：红光环绕。
          ctx.strokeStyle = 'rgba(255, 40, 40, 0.85)';
          ctx.lineWidth = 2.5;
          ctx.beginPath();
          ctx.arc(sx, sy, p.radius + 4 + Math.sin(frameCount * 0.4) * 1.5, 0, Math.PI * 2);
          ctx.stroke();
        }
      }
    }

    function drawParticles() {
      for (const p of particles) {
        ctx.globalAlpha = p.life;
        ctx.fillStyle = p.color;
        ctx.beginPath();
        ctx.arc(p.x - camera.x, p.y - camera.y, p.size, 0, Math.PI * 2);
        ctx.fill();
      }
      ctx.globalAlpha = 1;
    }

    function drawDamageTexts() {
      for (const t of damageTexts) {
        ctx.globalAlpha = t.life;
        ctx.fillStyle = t.color;
        ctx.font = 'bold 18px sans-serif';
        ctx.textAlign = 'center';
        ctx.strokeStyle = '#000';
        ctx.lineWidth = 3;
        ctx.strokeText(t.damage, t.x - camera.x, t.y - camera.y);
        ctx.fillText(t.damage, t.x - camera.x, t.y - camera.y);
        ctx.textAlign = 'left';
      }
      ctx.globalAlpha = 1;
    }

    function drawCombo() {
      if (combo.count < 2 || combo.timer <= 0) return;
      ctx.fillStyle = '#ffd700';
      ctx.font = 'bold 26px sans-serif';
      ctx.textAlign = 'center';
      ctx.strokeStyle = '#000';
      ctx.lineWidth = 4;
      const text = `连击 x${combo.count}`;
      ctx.strokeText(text, canvas.width / 2, 46);
      ctx.fillText(text, canvas.width / 2, 46);
      ctx.textAlign = 'left';
    }

    function drawHurtFlash() {
      if (player.hurtCooldown <= 25) return;
      const alpha = (player.hurtCooldown - 25) / 20 * 0.3;
      ctx.fillStyle = `rgba(180, 20, 20, ${alpha})`;
      ctx.fillRect(0, 0, canvas.width, canvas.height);
    }

    function drawBanner() {
      if (!banner) return;
      const alpha = Math.min(1, banner.timer / 40);
      ctx.globalAlpha = alpha;
      ctx.fillStyle = '#ffd700';
      ctx.font = 'bold 34px serif';
      ctx.textAlign = 'center';
      ctx.strokeStyle = '#000';
      ctx.lineWidth = 5;
      ctx.strokeText(banner.text, canvas.width / 2, 220);
      ctx.fillText(banner.text, canvas.width / 2, 220);
      ctx.textAlign = 'left';
      ctx.globalAlpha = 1;
    }

    function draw() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      drawGround();
      drawDecor();
      if (currentMap === 'forest') {
        for (const b of bells) drawBell(b);
      }
      for (const p of peaches) drawPeach(p);

      // 按 y 排序绘制，制造前后遮挡关系。
      const drawList = enemies.map(e => ({ y: e.y, draw: () => drawEnemy(e) }));
      drawList.push({ y: player.y, draw: drawPlayer });
      drawList.sort((a, b) => a.y - b.y);
      for (const item of drawList) item.draw();

      drawSlashes();
      drawProjectiles();
      drawParticles();
      drawSkillFx();
      drawDamageTexts();
      drawCombo();
      drawBanner();
      drawHurtFlash();
    }

    function gameLoop() {
      if (!gameRunning) return;

      frameCount++;
      updatePlayer();
      updateStaff();
      updateSkills();
      updateEnemies();
      updatePeaches();
      updateBells();
      updateProjectiles();
      updateParticles();
      updateSlashes();
      updateDamageTexts();
      draw();

      requestAnimationFrame(gameLoop);
    }

    function gameOver(win) {
      gameRunning = false;
      overlayTitle.textContent = win ? '功德圆满' : '天命人陨落';
      overlayTitle.style.color = win ? '#ffd700' : '#e94560';
      overlayMsg.textContent = win
        ? `你击败了黄风大圣，第二章完！第三章敬请期待。最终得分: ${score}`
        : checkpoint ? `最终得分: ${score}（将在黄风岭存档点复活）` : `最终得分: ${score}`;
      overlay.style.display = 'block';
    }

    function restartGame() {
      // 有存档点则于存档点复活，否则从头开始。
      if (checkpoint && checkpoint.map === 'huangfeng' && currentMap === 'huangfeng') {
        respawnAtCheckpoint();
        return;
      }
      initGame();
      gameLoop();
    }

    window.addEventListener('keydown', (e) => {
      keys[e.key] = true;
      if (['ArrowUp', 'ArrowDown', 'ArrowLeft', 'ArrowRight', ' '].includes(e.key)) {
        e.preventDefault();
      }
      if (e.key === ' ') {
        startCharge();
      }
      if (e.key === 'j' || e.key === 'J') {
        startSwing(1);
      }
      if (e.key === '1') castFreeze();
      if (e.key === '2') castSweep();
      if (e.key === '3') castFire();
      if (e.key === '4') castTransform();
      if (e.key === 'q' || e.key === 'Q') {
        stanceIdx = (stanceIdx + 1) % STANCES.length;
        stanceNameEl.textContent = STANCES[stanceIdx].name;
      }
      if (e.key === 'Shift') {
        const dx = player.moveDx || Math.cos(player.angle);
        const dy = player.moveDy || Math.sin(player.angle);
        startDodge(dx, dy);
      }
      if ((e.key === 'r' || e.key === 'R') && !gameRunning) {
        restartGame();
      }
    });

    window.addEventListener('keyup', (e) => {
      keys[e.key] = false;
      if (e.key === ' ') releaseCharge();
    });

    canvas.addEventListener('mousedown', () => {
      startSwing(1);
    });

    function resizeCanvas() {
      canvas.width = window.innerWidth;
      canvas.height = window.innerHeight;
    }

    window.addEventListener('resize', resizeCanvas);

    resizeCanvas();
    initGame();
    gameLoop();
  </script>
</body>
</html>
